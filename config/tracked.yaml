# Daily arXiv digest configuration.
# Topic-only matching. Keywords are normalized: lowercased and accent-stripped.
# Author-level tracking is handled by Gmail Scholar alerts, not this pipeline.

categories:
  - q-bio.QM      # Quantitative Methods
  - q-bio.GN      # Genomics
  - q-bio.PE      # Populations and Evolution
  - stat.AP       # Statistics - Applications

authors: []  # Deliberately empty — Gmail Scholar alerts handle author tracking.

